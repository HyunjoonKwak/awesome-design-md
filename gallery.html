<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Awesome DESIGN.md · Gallery</title>
<style>
  :root {
    --bg: #0b0b0f;
    --surface: #14141b;
    --surface-2: #1c1c26;
    --border: #2a2a38;
    --text: #f2f2f5;
    --text-dim: #9b9baa;
    --accent: #10b981;
    --danger: #ef4444;
    --radius: 14px;
    --radius-sm: 8px;
  }
  [data-theme="light"] {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f3f3ee;
    --border: #e5e5de;
    --text: #1a1a1a;
    --text-dim: #6b6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    transition: background .2s, color .2s; }
  a { color: inherit; }

  header {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in oklab, var(--bg) 85%, transparent);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto; padding: 16px 24px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  }
  .logo { font-weight: 700; font-size: 16px; letter-spacing: -.02em; }
  .logo span { color: var(--accent); }
  .count { color: var(--text-dim); font-size: 13px; }
  .spacer { flex: 1; }

  input.search {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: var(--radius-sm); font-size: 14px;
    min-width: 220px; outline: none;
  }
  input.search:focus { border-color: var(--accent); }

  .btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 13px; transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { opacity: .9; color: #fff; }

  .filters {
    max-width: 1400px; margin: 0 auto; padding: 14px 24px 0;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .chip {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 14px; border-radius: 999px; cursor: pointer; font-size: 12.5px;
    transition: all .15s; white-space: nowrap;
  }
  .chip:hover { color: var(--text); border-color: var(--text-dim); }
  .chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  main {
    max-width: 1400px; margin: 0 auto; padding: 24px;
  }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    display: flex; flex-direction: column;
  }
  .card:hover {
    transform: translateY(-2px); border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .card-preview {
    aspect-ratio: 16 / 10; position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--surface-2), var(--surface));
    display: flex; align-items: center; justify-content: center;
  }
  .card-preview .mark {
    font-size: 32px; font-weight: 800; letter-spacing: -.04em;
    color: var(--text); opacity: .92;
  }
  .card-preview::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.08), transparent 60%);
    pointer-events: none;
  }
  .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
  .card-title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .card-cat { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; }
  .card-desc { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* Modal */
  .modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.72); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .modal.open { display: flex; }
  .modal-inner {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); width: 100%; max-width: 1100px; height: 90vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-head {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .modal-head h2 { margin: 0; font-size: 18px; letter-spacing: -.01em; }
  .modal-head .sub { color: var(--text-dim); font-size: 13px; }
  .modal-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .modal-tabs {
    display: flex; gap: 4px; padding: 10px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .tab {
    background: transparent; border: 0; padding: 8px 14px;
    border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
    color: var(--text-dim);
  }
  .tab.active { background: var(--surface); color: var(--text); }
  .iframe-wrap { flex: 1; position: relative; background: var(--bg); }
  .iframe-wrap iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  .iframe-fallback {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; padding: 40px;
    text-align: center; color: var(--text-dim);
  }
  .iframe-fallback.show { display: flex; }

  .install {
    display: flex; gap: 8px; align-items: center;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px;
  }
  .install code { flex: 1; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 10px 18px;
    border-radius: 999px; font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  @media (max-width: 640px) {
    .header-inner { padding: 12px 16px; }
    .filters { padding: 10px 16px 0; }
    main { padding: 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .modal { padding: 0; }
    .modal-inner { height: 100vh; border-radius: 0; }
  }
</style>
</head>

const BASE_URL = "https://getdesign.md";

// State
let activeCat = "All";
let query = "";

// Helpers
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1400);
}

function previewMark(item) {
  const initials = item.name.replace(/[^A-Za-z]/g, "").slice(0, 2).toUpperCase() || item.name.slice(0, 2);
  // derive text color based on bg luminance
  const hex = (item.color || "#444").replace("#", "");
  const r = parseInt(hex.slice(0, 2), 16) || 0;
  const g = parseInt(hex.slice(2, 4), 16) || 0;
  const b = parseInt(hex.slice(4, 6), 16) || 0;
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  const textColor = lum > 0.55 ? "#111" : "#fff";
  const bg = `linear-gradient(135deg, ${item.color} 0%, ${item.color}dd 60%, ${item.color}99 100%)`;
  return { initials, bg, textColor };
}

function renderFilters() {
  const cats = ["All", ...new Set(DATA.map((d) => d.cat))];
  $("#filters").innerHTML = cats
    .map(
      (c) =>
        `<button class="chip ${c === activeCat ? "active" : ""}" data-cat="${c}">${c}</button>`
    )
    .join("");
  $$("#filters .chip").forEach((el) =>
    el.addEventListener("click", () => {
      activeCat = el.dataset.cat;
      renderFilters();
      renderGrid();
    })
  );
}

function renderGrid() {
  const q = query.trim().toLowerCase();
  const list = DATA.filter((d) => {
    const catOk = activeCat === "All" || d.cat === activeCat;
    const qOk = !q || d.name.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q) || d.slug.toLowerCase().includes(q);
    return catOk && qOk;
  });
  $("#count").textContent = `${list.length} / ${DATA.length}`;

  $("#grid").innerHTML = list
    .map((item, idx) => {
      const { initials, bg, textColor } = previewMark(item);
      return `
        <article class="card" data-slug="${item.slug}">
          <div class="card-preview" style="background: ${bg}">
            <div class="mark" style="color: ${textColor}">${initials}</div>
          </div>
          <div class="card-body">
            <div class="card-cat">${item.cat}</div>
            <div class="card-title">${item.name}</div>
            <div class="card-desc">${item.desc}</div>
          </div>
        </article>
      `;
    })
    .join("");

  $$("#grid .card").forEach((el) =>
    el.addEventListener("click", () => openModal(el.dataset.slug))
  );
}

// Modal
let currentItem = null;
let currentMode = "light";

function openModal(slug) {
  const item = DATA.find((d) => d.slug === slug);
  if (!item) return;
  currentItem = item;
  currentMode = "light";

  $("#m-title").textContent = item.name;
  $("#m-cat").textContent = item.cat;
  const installCmd = `npx getdesign@latest add ${item.slug}`;
  $("#m-install").textContent = installCmd;
  $("#m-open").href = `${BASE_URL}/${item.slug}/design-md`;
  $("#m-fallback-link").href = `${BASE_URL}/${item.slug}/design-md`;

  setMode("light");
  $("#modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  $("#modal").classList.remove("open");
  $("#m-frame").src = "about:blank";
  document.body.style.overflow = "";
}

function setMode(mode) {
  currentMode = mode;
  $$(".modal-tabs .tab").forEach((t) =>
    t.classList.toggle("active", t.dataset.mode === mode)
  );
  if (!currentItem) return;
  let url = `${BASE_URL}/${currentItem.slug}/design-md`;
  // getdesign.md 미리보기는 페이지 내부에서 라이트/다크를 토글하므로 같은 URL 사용
  $("#m-fallback").classList.remove("show");
  $("#m-frame").style.display = "block";
  $("#m-frame").src = url;
}

// Iframe error detection (best-effort)
let frameLoadTimer = null;
$("#m-frame").addEventListener("load", () => {
  // getdesign.md는 X-Frame-Options로 차단될 수 있음 → 로드 실패 감지 어려움
  // 간단히 사용자가 "새 탭" 버튼으로 fallback 가능
});

// Events
$("#search").addEventListener("input", (e) => {
  query = e.target.value;
  renderGrid();
});
$("#theme-toggle").addEventListener("click", () => {
  const cur = document.body.dataset.theme;
  document.body.dataset.theme = cur === "dark" ? "light" : "dark";
});
$("#m-close").addEventListener("click", closeModal);
$("#modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") closeModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && $("#modal").classList.contains("open")) closeModal();
});
$$(".modal-tabs .tab").forEach((t) =>
  t.addEventListener("click", () => setMode(t.dataset.mode))
);
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-copy]");
  if (!btn) return;
  const txt = $("#m-install").textContent;
  navigator.clipboard.writeText(txt).then(() => toast("설치 커맨드 복사됨"));
});

// Init
renderFilters();
renderGrid();
</script>
</body>
</html>
